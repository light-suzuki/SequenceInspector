<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sequence Inspector</title>
<style>body{font:16px system-ui;max-width:980px;margin:30px auto;padding:0 18px;color:#172554}header{display:flex;justify-content:space-between;align-items:center}textarea{width:100%;min-height:180px;font-family:monospace}button,input{padding:9px;margin:6px 4px 6px 0}.card{border:1px solid #bfdbfe;border-radius:12px;padding:16px;margin:14px 0;background:#f8fafc}.error{color:#b91c1c}table{border-collapse:collapse;width:100%}th,td{border-bottom:1px solid #ddd;padding:7px;text-align:left}</style></head><body>
<header><div><h1>Sequence Inspector</h1><p id="subtitle"></p></div><button id="lang"></button></header>
<div class="card"><label id="seqLabel" for="seq"></label><textarea id="seq" placeholder=">example&#10;ATG..."></textarea><br><label id="enzLabel" for="enz"></label><input id="enz" value="EcoRI,BamHI,HindIII"><button id="analyze"></button><p class="error" id="error"></p></div>
<div id="result" class="card" hidden><h2 id="summaryTitle"></h2><p id="summary"></p><h2 id="orfTitle"></h2><div id="orfs"></div><h2 id="cutTitle"></h2><div id="cuts"></div></div>
<script>
const t={en:{subtitle:'Private, offline DNA sequence checks in your browser.',seq:'FASTA or DNA sequence',enz:'Restriction enzymes (comma-separated)',go:'Analyze',sum:'Summary',orf:'ORF candidates (minimum 30 aa)',cuts:'Restriction sites',empty:'Enter a DNA sequence.',bad:'Only IUPAC DNA characters are accepted.',none:'None',frame:'Frame',start:'Start',end:'End',length:'Length',enzyme:'Enzyme',positions:'Positions',switch:'日本語'},ja:{subtitle:'ブラウザ内だけで動く、オフラインDNA配列チェック。',seq:'FASTA または DNA 配列',enz:'制限酵素（カンマ区切り）',go:'解析する',sum:'概要',orf:'ORF候補（30 aa以上）',cuts:'制限酵素サイト',empty:'DNA配列を入力してください。',bad:'IUPAC DNA文字だけを入力できます。',none:'なし',frame:'フレーム',start:'開始',end:'終了',length:'長さ',enzyme:'酵素',positions:'位置',switch:'English'}};
const motifs={EcoRI:'GAATTC',BamHI:'GGATCC',HindIII:'AAGCTT',XhoI:'CTCGAG',PstI:'CTGCAG',SmaI:'CCCGGG',KpnI:'GGTACC',NcoI:'CCATGG',NotI:'GCGGCCGC'};let lang=localStorage.lang||((navigator.language||'').startsWith('ja')?'ja':'en');
function ui(){const x=t[lang];document.documentElement.lang=lang;langBtn.textContent=x.switch;subtitle.textContent=x.subtitle;seqLabel.textContent=x.seq;enzLabel.textContent=x.enz;analyze.textContent=x.go;summaryTitle.textContent=x.sum;orfTitle.textContent=x.orf;cutTitle.textContent=x.cuts}const langBtn=document.querySelector('#lang');langBtn.onclick=()=>{lang=lang==='en'?'ja':'en';localStorage.lang=lang;ui()};
function clean(raw){return raw.split(/\r?\n/).filter(x=>!x.startsWith('>')).join('').replace(/\s/g,'').toUpperCase()}
function findOrfs(s){const a=[];for(let f=0;f<3;f++)for(let i=f;i<s.length-2;i+=3)if(s.slice(i,i+3)==='ATG')for(let j=i+3;j<s.length-2;j+=3)if(['TAA','TAG','TGA'].includes(s.slice(j,j+3))){if(j+3-i>=90)a.push({f:f+1,s:i+1,e:j+3,l:(j+3-i)/3-1});break}return a}
function table(head,rows){return rows.length?'<table><thead><tr>'+head.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(x=>'<td>'+x+'</td>').join('')+'</tr>').join('')+'</tbody></table>':t[lang].none}
analyze.onclick=()=>{error.textContent='';const s=clean(seq.value);if(!s){error.textContent=t[lang].empty;return}if(/[^ACGTRYSWKMBDHVN]/.test(s)){error.textContent=t[lang].bad;return}const gc=(100*(s.match(/[GC]/g)||[]).length/s.length).toFixed(2);summary.textContent=`${t[lang].length}: ${s.length} bp · GC: ${gc}%`;const os=findOrfs(s);orfs.innerHTML=table([t[lang].frame,t[lang].start,t[lang].end,t[lang].length+' (aa)'],os.map(o=>[o.f,o.s,o.e,o.l]));const cs=enz.value.split(',').map(x=>x.trim()).filter(Boolean).map(n=>{const m=motifs[n],p=[];if(m)for(let i=s.indexOf(m);i>=0;i=s.indexOf(m,i+1))p.push(i+1);return[n,p.join(', ')||t[lang].none]});cuts.innerHTML=table([t[lang].enzyme,t[lang].positions],cs);result.hidden=false};ui();
</script></body></html>
